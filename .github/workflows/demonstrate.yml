name: demonstrate-bug

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# We want every matrix cell to run and report its verdict, even if one fails.
jobs:
  linux:
    name: ${{ matrix.runner }} / gfortran-${{ matrix.gfortran }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 ships gfortran-9..12 in its repos; ubuntu-24.04 ships
        # gfortran-12..14. We cover both so we get the broadest version range.
        include:
          - runner: ubuntu-22.04
            gfortran: "9"
          - runner: ubuntu-22.04
            gfortran: "10"
          - runner: ubuntu-22.04
            gfortran: "11"
          - runner: ubuntu-22.04
            gfortran: "12"
          - runner: ubuntu-24.04
            gfortran: "12"
          - runner: ubuntu-24.04
            gfortran: "13"
          - runner: ubuntu-24.04
            gfortran: "14"
          - runner: ubuntu-24.04
            gfortran: "15"
    steps:
      - uses: actions/checkout@v4

      - name: Install gfortran-${{ matrix.gfortran }}
        id: install
        run: |
          set -e
          # Try the default apt index first; fall back to the toolchain PPA.
          if sudo apt-get update && sudo apt-get install -y "gfortran-${{ matrix.gfortran }}"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "Default repo did not have gfortran-${{ matrix.gfortran }}; trying ubuntu-toolchain-r/test PPA"
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
            sudo apt-get update
            if sudo apt-get install -y "gfortran-${{ matrix.gfortran }}"; then
              echo "available=true" >> "$GITHUB_OUTPUT"
            else
              echo "available=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Record environment
        if: steps.install.outputs.available == 'true'
        run: |
          echo "uname -a: $(uname -a)"
          echo "uname -m: $(uname -m)"
          "gfortran-${{ matrix.gfortran }}" --version

      - name: Compile + run at -O0/-O1/-O2/-O3
        if: steps.install.outputs.available == 'true'
        env:
          FC: gfortran-${{ matrix.gfortran }}
        run: |
          set -e
          bash ./run_matrix.sh "$FC"

      - name: Compiler unavailable on this runner
        if: steps.install.outputs.available != 'true'
        run: |
          echo "::warning::gfortran-${{ matrix.gfortran }} not installable on ${{ matrix.runner }}; skipping."

  macos:
    name: ${{ matrix.runner }} / gcc@${{ matrix.gcc }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            gcc: "13"
          - runner: macos-14
            gcc: "14"
          - runner: macos-14
            gcc: "15"
          - runner: macos-13
            gcc: "13"
          - runner: macos-13
            gcc: "14"
          - runner: macos-13
            gcc: "15"
    steps:
      - uses: actions/checkout@v4

      - name: Install gcc@${{ matrix.gcc }} via Homebrew
        id: install
        run: |
          set -e
          if brew install "gcc@${{ matrix.gcc }}"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Locate gfortran binary
        id: locate
        if: steps.install.outputs.available == 'true'
        run: |
          set -e
          # On macOS arm64, Homebrew installs to /opt/homebrew; on x86_64 to /usr/local.
          BREW_PREFIX="$(brew --prefix "gcc@${{ matrix.gcc }}")"
          FC="${BREW_PREFIX}/bin/gfortran-${{ matrix.gcc }}"
          if [ ! -x "$FC" ]; then
            # Fallback: search the keg.
            FC="$(find "$BREW_PREFIX/bin" -maxdepth 1 -name 'gfortran*' | head -n1)"
          fi
          echo "fc=$FC" >> "$GITHUB_OUTPUT"
          echo "Using FC=$FC"

      - name: Record environment
        if: steps.install.outputs.available == 'true'
        run: |
          echo "uname -a: $(uname -a)"
          echo "uname -m: $(uname -m)"
          "${{ steps.locate.outputs.fc }}" --version

      - name: Compile + run at -O0/-O1/-O2/-O3
        if: steps.install.outputs.available == 'true'
        env:
          FC: ${{ steps.locate.outputs.fc }}
        run: |
          set -e
          bash ./run_matrix.sh "$FC"

      - name: Compiler unavailable on this runner
        if: steps.install.outputs.available != 'true'
        run: |
          echo "::warning::gcc@${{ matrix.gcc }} not installable on ${{ matrix.runner }}; skipping."

  intel-ifx:
    name: ubuntu-latest / ifx ${{ matrix.opt }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        opt: ['-O0', '-O1', '-O2', '-O3']
    steps:
      - uses: actions/checkout@v4

      - name: Install Intel oneAPI (ifx + icx + MPI)
        uses: Migelo/setup-intel-oneapi@main
        # No `with:` block — defaults install ifx + icx + Intel MPI
        # and propagate the oneAPI env to subsequent steps.

      - name: Record environment
        run: |
          echo "uname -a: $(uname -a)"
          echo "uname -m: $(uname -m)"
          ifx --version

      - name: Compile and run repro at ${{ matrix.opt }}
        id: run
        continue-on-error: true
        run: |
          set -u
          ifx ${{ matrix.opt }} repro.f90 -o /tmp/repro_ifx
          /tmp/repro_ifx | tee /tmp/out.txt
          # Detect the bug by parsing the four printed hex words. The bug
          # signature is s(1) == s(3) (the -O3 gfortran miscompilation also
          # folds the in-program guard, so the program's own exit code is
          # not a reliable detector). See run_matrix.sh for the rationale.
          s1=$(grep -E '^s\(1\) = 0x' /tmp/out.txt | head -n1 | sed -E 's/^s\(1\) = 0x//')
          s3=$(grep -E '^s\(3\) = 0x' /tmp/out.txt | head -n1 | sed -E 's/^s\(3\) = 0x//')
          if [ -z "$s1" ] || [ -z "$s3" ]; then
            echo "result=UNPARSEABLE" >> "$GITHUB_OUTPUT"
            echo "::error::Could not parse s(1)/s(3) from program output"
            exit 1
          fi
          if [ "$s1" = "$s3" ]; then
            echo "result=BUG_PRESENT" >> "$GITHUB_OUTPUT"
            echo "::error::ifx ${{ matrix.opt }} reproduces the bug (s(1)==s(3))"
            exit 1
          else
            echo "result=NO_BUG" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize
        run: |
          echo "::notice::ifx ${{ matrix.opt }}: ${{ steps.run.outputs.result }}"

  nvfortran:
    name: ubuntu-latest / nvfortran ${{ matrix.opt }}
    runs-on: ubuntu-latest
    continue-on-error: true
    # NVIDIA HPC SDK ships nvfortran in their official container. Pin a
    # specific tag (NOT `latest`). The 25.x family is current as of 2026;
    # we use 25.11 on ubuntu24.04 (verified present on nvcr.io and the
    # newest 25.x devel tag at the time this job was added). The amd64
    # image is ~6.3 GiB compressed; the runner has enough disk.
    container:
      image: nvcr.io/nvidia/nvhpc:25.11-devel-cuda13.0-ubuntu24.04
    strategy:
      fail-fast: false
      matrix:
        opt: ['-O0', '-O1', '-O2', '-O3']
    steps:
      # The nvhpc:25.11-devel-ubuntu24.04 container ships node and git,
      # so actions/checkout@v4 works out of the box. If a future tag drops
      # node, switch to checkout@v3 or install node manually in a prep
      # step.
      - uses: actions/checkout@v4

      - name: Record environment
        run: |
          echo "uname -a: $(uname -a)"
          echo "uname -m: $(uname -m)"
          nvfortran --version

      - name: Compile and run repro at ${{ matrix.opt }}
        id: run
        continue-on-error: true
        run: |
          set -u
          # nvfortran accepts -O0/-O1/-O2/-O3 with semantics broadly
          # comparable to gfortran/ifx (default is -O2; -O3 enables
          # additional unrolling and SIMD).  We pass exactly the matrix
          # opt flag and nothing else, mirroring the ifx control matrix.
          nvfortran ${{ matrix.opt }} repro.f90 -o /tmp/repro_nv
          /tmp/repro_nv | tee /tmp/out.txt
          # Bug detector mirrors the ifx job: parse the four hex words
          # and check whether s(1) == s(3). We do not rely on the
          # program's exit code because the gfortran -O3 miscompilation
          # also folds the in-program "if s(1) == s(3) stop 1" guard,
          # so a compiler that miscompiles the same way could print "OK"
          # and exit 0 even with a degenerate state. See run_matrix.sh
          # for the full rationale.
          s1=$(grep -E '^s\(1\) = 0x' /tmp/out.txt | head -n1 | sed -E 's/^s\(1\) = 0x//')
          s3=$(grep -E '^s\(3\) = 0x' /tmp/out.txt | head -n1 | sed -E 's/^s\(3\) = 0x//')
          if [ -z "$s1" ] || [ -z "$s3" ]; then
            echo "result=UNPARSEABLE" >> "$GITHUB_OUTPUT"
            echo "::error::Could not parse s(1)/s(3) from program output"
            exit 1
          fi
          if [ "$s1" = "$s3" ]; then
            echo "result=BUG_PRESENT" >> "$GITHUB_OUTPUT"
            echo "::error::nvfortran ${{ matrix.opt }} reproduces the bug (s(1)==s(3))"
            exit 1
          else
            echo "result=NO_BUG" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize
        run: |
          echo "::notice::nvfortran ${{ matrix.opt }}: ${{ steps.run.outputs.result }}"
